# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
scene: !include scenes.yaml

####################################
# IR コマンド定義
####################################
shell_command:
  send_light_step: "ir-ctl -d /dev/lirc0 --send=/config/ir/light_step.txt"
  send_light_up:   "ir-ctl -d /dev/lirc0 --send=/config/ir/light_up.txt"
  send_light_down: "ir-ctl -d /dev/lirc0 --send=/config/ir/light_down.txt"
  send_aircon_on:  "ir-ctl -d /dev/lirc0 --send=/config/ir/panasonic_test_on_27c.txt"
  send_aircon_off: "ir-ctl -d /dev/lirc0 --send=/config/ir/aircon_off.txt"

####################################
# ヘルパー
#
# input_boolean.light_assumed_on:
#   照度センサーで判定できない「常夜灯/消灯」を補完するフラグ。
#   センサーが反応しない照度帯（≤20lx）での状態をHAが推測保持する。
#   全灯時はセンサー実測値が優先されるためこのフラグは無視される。
####################################
input_boolean:
  light_assumed_on:
    name: "照明 点灯想定フラグ"
    icon: mdi:lightbulb-outline

####################################
# 照明エンティティ
#
# 明るさマッピング:
#   20lx(閾値) 〜 205lx(実測最大) → 10 〜 255
#   全灯最暗の40lx前後でスライダーが14%前後になる（自然な表示）
####################################
light:
  - platform: template
    lights:
      bedroom_light:
        friendly_name: "寝室の照明"

        # 状態テンプレート
        value_template: >
          {% set lux = states('sensor.bh1750_illuminance') | float(0) %}
          {% if is_state('sun.sun', 'below_horizon') %}
            {{ lux > 20 or is_state('input_boolean.light_assumed_on', 'on') }}
          {% else %}
            {{ is_state('input_boolean.light_assumed_on', 'on') }}
          {% endif %}

        # 明るさテンプレート
        # 20lx(閾値)〜205lx(最大)を 10〜255 にマッピング
        level_template: >
          {% set lux = states('sensor.bh1750_illuminance') | float(0) %}
          {% if lux > 20 %}
            {{ [[(((lux - 20) / (205 - 20)) * 245 + 10) | int, 10] | max, 255] | min }}
          {% else %}
            10
          {% endif %}

        # ON にする
        turn_on:
          - service: shell_command.send_light_step
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.light_assumed_on
          - delay: "00:00:01"
          # 夜間にまだ全灯になっていなければ再度送信（常夜灯状態だった場合の救済）
          - if:
              - condition: template
                value_template: >
                  {{ states('sensor.bh1750_illuminance') | float(0) <= 20
                     and is_state('sun.sun', 'below_horizon') }}
            then:
              - service: shell_command.send_light_step
              - delay: "00:00:01"

        # OFF にする
        turn_off:
          - choose:
              # 全灯(lux>20) → 2回押して消灯（全灯→常夜灯→消灯）
              - conditions: >
                  {{ states('sensor.bh1750_illuminance') | float(0) > 20 }}
                sequence:
                  - service: shell_command.send_light_step
                  - delay: "00:00:01"
                  - service: shell_command.send_light_step
            # 常夜灯想定 → 1回押して消灯
            default:
              - service: shell_command.send_light_step
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.light_assumed_on

        # 明るさスライダー
        # 開始時にBH1750を高速モードに切り替え、完了後に通常モードに戻す
        # count:10 固定ループ + 目標到達したら stop で打ち切り
        set_level:
          - variables:
              target_lux: >
                {{ ((brightness | int - 10) / 245.0 * (205 - 20) + 20) | int }}
          # センサーを高速モードに切り替え（1秒間隔）
          - service: mqtt.publish
            data:
              topic: home/bh1750/control
              payload: "fast"
          # 全灯でなければまずONにする
          - if:
              - condition: template
                value_template: >
                  {{ states('sensor.bh1750_illuminance') | float(0) <= 20 }}
            then:
              - service: shell_command.send_light_step
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.light_assumed_on
              - delay: "00:00:01"
              - if:
                  - condition: template
                    value_template: >
                      {{ states('sensor.bh1750_illuminance') | float(0) <= 20
                         and is_state('sun.sun', 'below_horizon') }}
                then:
                  - service: shell_command.send_light_step
                  - delay: "00:00:01"
          # フィードバックループ（最大10回）
          - repeat:
              count: 10
              sequence:
                - variables:
                    lux_now: "{{ states('sensor.bh1750_illuminance') | float(0) }}"
                - choose:
                    # 目標内に入ったら停止
                    - conditions: "{{ (lux_now - target_lux) | abs <= 15 }}"
                      sequence:
                        - stop: "目標照度に到達"
                    # 暗すぎる → 明るく
                    - conditions: "{{ lux_now < target_lux - 15 }}"
                      sequence:
                        - service: shell_command.send_light_up
                        - delay: "00:00:01"
                    # 明るすぎる → 暗く
                    - conditions: "{{ lux_now > target_lux + 15 }}"
                      sequence:
                        - service: shell_command.send_light_down
                        - delay: "00:00:01"
          # センサーを通常モードに戻す
          - service: mqtt.publish
            data:
              topic: home/bh1750/control
              payload: "normal"

####################################
# スクリプト（ダッシュボード用ボタン）
####################################
script:
  light_toggle:
    alias: "照明 切り替え"
    icon: mdi:light-switch
    sequence:
      - service: shell_command.send_light_step

  light_up:
    alias: "照明 明るく"
    icon: mdi:brightness-5
    sequence:
      - service: shell_command.send_light_up

  light_down:
    alias: "照明 暗く"
    icon: mdi:brightness-7
    sequence:
      - service: shell_command.send_light_down

####################################
# MQTT センサー
####################################
mqtt:
  sensor:
    - name: "BME280 Temperature"
      state_topic: "home/bme280"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      value_template: "{{ value_json.temperature }}"
    - name: "BME280 Humidity"
      state_topic: "home/bme280"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement
      value_template: "{{ value_json.humidity }}"
    - name: "BME280 Pressure"
      state_topic: "home/bme280"
      unit_of_measurement: "hPa"
      value_template: "{{ value_json.pressure }}"
    - name: "MH-Z19 CO2"
      state_topic: "home/mhz19"
      unit_of_measurement: "ppm"
      device_class: carbon_dioxide
      state_class: measurement
      value_template: "{{ value_json.co2 }}"
    - name: "BH1750 Illuminance"
      state_topic: "home/bh1750"
      unit_of_measurement: "lx"
      device_class: illuminance
      state_class: measurement
      value_template: "{{ value_json.illuminance }}"
